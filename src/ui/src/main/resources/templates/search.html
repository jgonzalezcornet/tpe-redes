<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/layout :: layout (~{::body},'catalog')}"
>
  <body>
    <section class="max-w-4xl mx-auto px-4 py-8">
      <div class="flex flex-col md:flex-row gap-8">
        <!-- Sidebar Filter -->
        <div class="w-full md:w-36 h-fit">
          <h3 class="font-semibold text-gray-800 mb-4 uppercase text-xs">
            Categories
          </h3>
          <ul class="space-y-2 text-sm category-menu">
            <li>
              <a
                href="#"
                class="text-gray-600 hover:text-primary-500 block py-1"
                th:href="@{/catalog(page=1)}"
                >All Products</a
              >
            </li>
            <li th:each="tag : ${tags}">
              <a
                href="#"
                class="text-gray-600 hover:text-primary-500 block py-1"
                th:text="${tag.displayName}"
                th:href="@{/catalog(page=1,tag=${tag.name})}"
                >Smart</a
              >
            </li>
          </ul>
        </div>

        <!-- Product Grid -->
        <div class="flex-1">
          <form action="/catalog/search" method="get" class="mb-4 flex gap-2">
            <input type="hidden" name="view" value="html" />
            <input
              name="q"
              type="text"
              th:value="${query}"
              placeholder="Search products..."
              class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm"
            />
            <button
              type="submit"
              class="px-4 py-2 text-sm rounded-lg bg-primary-500 text-white hover:bg-primary-600"
            >
              Search
            </button>
          </form>

          <div
            th:if="${#lists.isEmpty(products)}"
            class="text-center text-gray-500 py-12"
          >
            No products found.
          </div>

          <div
            class="grid grid-cols-2 lg:grid-cols-3 gap-6"
            th:unless="${#lists.isEmpty(products)}"
          >
            <div th:each="item : ${products}">
              <div th:replace="~{fragments/product_card :: card(${item}) }"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
